<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html" />

<sly data-sly-call="${clientlib.all @ categories='mysite.text'}" />

<div class="text-component">

    <!-- Heading (if provided) -->
    <div data-sly-test="${properties.heading}" class="text-heading">
        <h2>${properties.heading}</h2>
    </div>

    <!-- Rich Text Content -->
    <div data-sly-test="${properties.text}" class="text-content">
        ${properties.text @ context='html'}
    </div>

    <!-- Empty State (Author mode) -->
    <div data-sly-test="${!properties.text && wcmmode.edit}" class="text-empty">
        <p>Click the wrench icon to add text content</p>
    </div>

</div>
